project:
  name: sample-agent
  mode: script

runner:
  concurrency: 1
  timeout_seconds: 10
  retry_times: 0
  fail_fast: false

target:
  script:
    command: "{python} sample_agent.py --input-file {input_file}"
  http:
    url: "http://localhost:8000/chat"
    method: "POST"
    headers:
      Content-Type: "application/json"
    payload_mapping:
      query: "$.inputs.query"
  adapter:
    # Switch project.mode to adapter to call this Python function in-process.
    # The function receives the full case dict and may return either a raw
    # response object or {response: ..., debug_meta: ...}.
    module: ""
    function: "run"

dataset:
  # The generated sample is intentionally tiny: one case passes and one fails.
  # The expected failure proves local clustering, summary.md, and repair_input.json
  # are useful on the first offline run.
  paths:
    - "cases/sample.jsonl"

evaluation:
  llm_judge:
    enabled: false
    provider: stub
    model: stub
    stub_result: skipped
  rule_assertions:
    enabled: true
  # Per-case evaluation_policy may set:
  #   reruns: N          # run N additional independent evaluation attempts
  #   pass_rule: all     # aggregates assertions inside each attempt and
  #                      # aggregates attempt outcomes across reruns
  # runner.retry_times is separate: it retries a failed process/HTTP call
  # inside one evaluation attempt.

cluster:
  enabled: true
  llm_summary: false

artifacts:
  root_dir: "./runs"
  save_raw_response: true
  save_debug_meta: true
  reports_dir: "./reports"
