project:
  name: sample-agent
  mode: adapter

runner:
  concurrency: 1
  timeout_seconds: 10
  retry_times: 0
  fail_fast: false

target:
  adapter:
    # Python function mode is the generated default. The function receives the
    # full case dict and may return either a raw response object or
    # {response: ..., debug_meta: ...}.
    module: sample_agent
    function: run
  script:
    # Supported advanced process mode for non-Python commands or hard
    # subprocess isolation. Switch project.mode to script to use it.
    command: "{python} your_script_agent.py --input-file {input_file}"
  http:
    url: "http://localhost:8000/chat"
    method: "POST"
    headers:
      Content-Type: "application/json"
    payload_mapping:
      query: "$.inputs.query"

dataset:
  # The generated sample is intentionally tiny: one case passes and one fails.
  # The expected failure proves local clustering, summary.md, and repair_input.json
  # are useful on the first offline run.
  paths:
    - "cases/sample.jsonl"

evaluation:
  llm_judge:
    enabled: false
    provider: stub
    model: stub
    stub_result: skipped
  rule_assertions:
    enabled: true
  # Per-case evaluation_policy may set:
  #   reruns: N          # run N additional independent evaluation attempts
  #   pass_rule: all     # aggregates assertions inside each attempt and
  #                      # aggregates attempt outcomes across reruns
  # runner.retry_times is separate: it retries a failed process/HTTP/adapter call
  # inside one evaluation attempt.

cluster:
  enabled: true
  llm_summary: false

artifacts:
  root_dir: "./runs"
  save_raw_response: true
  save_debug_meta: true
  reports_dir: "./reports"
